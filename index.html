<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
	<!-- <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="./css/index.css">
	<link rel="shortcut icon" href="./img/logo.svg">
	<title>FRCounting</title>
</head>

<body>
	<div class="login">
		<input type="email" name="" id="email" value="bubabum.drt@gmail.com">
		<input type="password" id="password" value="Zauer6822">
		<button id="login" class="blue">Вхід</button>
	</div>
	<div class="wrapper">
		<div class="sidebar">
			<button id="reportList" data-screen="reports" class="sidebar__btn active">
				<span class="material-icons-round">format_list_bulleted</span>
				<span class="btn-title">Звіти</span>
				<span class="material-icons-round chevron">chevron_right</span>
			</button>
			<button id="openReport" data-screen="newReport" class="sidebar__btn" disabled>
				<span class="material-icons-round">feed</span>
				<span class="btn-title">Звіт</span>
				<span class="material-icons-round chevron">chevron_right</span>
			</button>
			<button data-screen="import" class="sidebar__btn">
				<span class="material-icons-round ">file_upload</span>
				<span class="btn-title">Імпорт</span>
				<span class="material-icons-round chevron">chevron_right</span>
			</button>
			<button data-screen="export" class="sidebar__btn">
				<span class="material-icons-round">file_download</span>
				<span class="btn-title">Експорт</span>
				<span class="material-icons-round chevron">chevron_right</span>
			</button>
			<button id="openCharts" data-screen="charts" class="sidebar__btn" disabled>
				<span class="material-icons-round">bar_chart</span>
				<span class="btn-title">Графіки</span>
				<span class="material-icons-round chevron">chevron_right</span>
			</button>
		</div>
		<div class="content">
			<div id="reports" class="content__screen active">
				<div class="content__title">Звіти</div>
				<div class="content__page">
					<div class="content__controls">
						<button id="createReport" class="reports__add blue"><span class="material-icons-round">create</span>Створити</button>
					</div>
					<div class="content__row">
						<div class="content__section">
							<div class="reports">
								<div class="reports__header">
									<div>Дата</div>
									<div>Дохід</div>
									<div>Витрати</div>
									<div>Прибуток</div>
									<div>-</div>
								</div>
								<div id="reportsContainer" class="reports__content"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div id="newReport" class="content__screen">
				<div class="content__title">Звіт</div>
				<div class="content__page">
					<div class="content__row">
						<div class="content__column content__column_40">
							<div class="content__row">
								<div class="content__section">
									<h2>Дохід</h2>
									<label for="">Дохід (70 рахунок)</label>
									<input class="report-input" type="number" min="0" value="0" name="mainIncome">
									<label for="">Додаткові надходження</label>
									<input class="report-input" type="number" min="0" value="0" name="subIncome">
								</div>
								<div class="content__section">
									<h2>Баланс</h2>
									<label for="">На початок періоду</label>
									<input class="report-input" type="number" min="0" value="0" name="initialBalance">
									<label for="">Поточний</label>
									<div id="balance" class="content__number">0.00 ₴</div>
								</div>
							</div>
							<div class="content__row">
								<div class="content__section">
									<h2>Собівартість</h2>
									<div class="cost-price">
										<label for="">Продукції (26 рахунок)</label>
										<input class="report-input" type="number" min="0" value="0" name="productionCosts">
										<label for="">Товарів (281 рахунок)</label>
										<input class="report-input" type="number" min="0" value="0" name="goodsCosts">
									</div>
								</div>
								<div class="content__section">
									<h2>Прибуток</h2>
									<label for="">Операційний</label>
									<div id="grossProfit" class="content__number">0.00 ₴</div>
									<label for="">Дивіденди</label>
									<input class="report-input" type="number" min="0" value="0" name="dividentsAmount">
								</div>
							</div>
							<div class="content__row">
								<div class="content__section content__section_dividents">
									<div>
										<h2>Дивіденди</h2>
										<div class="divivdents"></div>
									</div>
									<div>
										<h2>Залишок на наступний період</h2>
										<div id="restBalance" class="content__number">0.00 ₴</div>
									</div>
								</div>
							</div>
						</div>
						<div class="content__column content__column_60">
							<div class="content__controls">
								<input id="reportDate" class="" type="month" name="date">
								<div class="report-buttons">
									<button id="printReport" class="blue"><span class="material-icons-round">print</span>Друк</button>
									<button id="saveReport" class="blue"><span class="material-icons-round">bookmark</span>Зберегти</button>
									<button id="closeReport" class="red"><span class="material-icons-round">close</span>Закрити</button>
								</div>
							</div>
							<div class="content__section content__section_expenses">
								<h2>Витрати</h2>
								<div id="expenses" class="expenses"></div>
								<div class="content__footer content__footer_expenses">
									<div class="expenses-summary">
										<label for="">Всього</label>
										<div id="totalExpenses" class="content__number">0.00 ₴</div>
									</div>
									<button class="add-expense blue"><span class="material-icons-round">add</span>Додати</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div id="import" class="content__screen">
				<div class="content__title">Імпорт</div>
				<div class="content__page">
					<div class="content__section">
						<button id="importFromFile" class="blue"><span class="material-icons-round">file_upload</span>Імпорт</button>
						<input id="file" type="file" accept=".json">
					</div>
				</div>
			</div>
			<div id="export" class="content__screen">
				<div class="content__title">Експорт</div>
				<div class="content__page">
					<div class="content__section">
						<button id="saveToFile" class="blue"><span class="material-icons-round">file_download</span>Експорт</button>
					</div>
				</div>
			</div>
			<div id="charts" class="content__screen">
				<div class="content__title">Графік</div>
				<div class="content__page">
					<div class="content__row">
						<div class="content__column">
							<div class="content__row">
								<div class=" content__section">
									<label for="">Графіки за:</label>
									<select id="chartYears" class="" name="chartYears"></select>
								</div>
							</div>
						</div>
						<div class="content__column">
							<div class="content__row">
								<div class="chart content__section">
									<canvas id="revenueChart"></canvas>
								</div>
							</div>
						</div>
					</div>
					<div class="content__row">
						<div class="content__column">
							<div class="content__row">
								<div class="chart content__section">
									<canvas id="grossProfitChart"></canvas>
								</div>
							</div>
						</div>
						<div class="content__column">
							<div class="content__row">
								<div class="chart content__section">
									<canvas id="totalExpensesChart"></canvas>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script type="module" src="./js/index.js"></script>
</body>

</html>
